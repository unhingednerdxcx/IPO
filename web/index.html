<html>
    <head>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
        />
        <link
            rel="stylesheet"
            href="style.css"
        />
    </head>
    <body>
        <div class="side-bar">
            <div class="tabs">
                <div class="tab" id="side-search">
                    <div class="tab-content">
                        <span class="material-symbols-outlined tab-icon">
                            search
                        </span>
                        <div class="tab-description">Search</div>
                    </div>
                </div>
                <div class="tab">
                    <div class="tab-content">
                        <span class="material-symbols-outlined">
                            today
                        </span>
                        <div class="tab-description">Today</div>
                    </div>
                </div>
                <div class="tab">
                    <div class="tab-content">
                        <span class="material-symbols-outlined">
                            calendar_today
                        </span>
                        <div class="tab-description">Upcoming</div>
                    </div>
                </div>
                <div class="tab" id="side-new-task">
                    <div class="tab-content">
                        <span class="material-symbols-outlined">
                            add
                        </span>
                        <div class="tab-description">New task</div>
                    </div>
                </div>
            </div>
            <hr style="border-color: #263a33; width: 90%; margin-top: 6%;">
            <div class="tab">
                <div class="tab-content">
                    <span class="material-symbols-outlined tab-icon">
                        add
                    </span>
                    <div class="tab-description">New group</div>
                </div>
            </div>
            <div class="groups">
                <div class="group">
                    <div class="group-title">Programing project</div>
                    <div class="group-tabs">
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                    </div>
                </div>
                <div class="group">
                    <div class="group-title">Programing project</div>
                    <div class="group-tabs">
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="default">
                <div class="default-content">
                    <span class="material-symbols-outlined default-icon">
                        assignment
                    </span>
                    <div class="default-text">Let's get to work! </div>
                </div>
            </div>

            <div class="Today">
                <ul class="tasks">
                    <li class="task">
                        <button class="toggle-task">
                            <span class="material-symbols-outlined default-icon check-task">
                                check_small
                            </span>
                        </button>
                        <span class="task-description">sss</span>
                    </li>
                    <li class="task">
                        <button class="toggle-task">
                        </button>
                        <span class="task-description">sss</span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="hide-all" id="hide-all">
            <div class="context-menu">
                <span id="context-description" class="context-description"></span>
                <input type="text" class="context-input" id="context-input">
            </div>
        </div>
        <script type="module" src="dist/script.js"></script>
    </body>
</html>
