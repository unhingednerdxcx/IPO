<html>
    <head>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap');
        </style>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
        />
        <style>
            .title {
                font-family: 'Sour Gummy', sans-serif;
                font-size: 6rem;
                font-weight: 600;
            }
            .side-bar {
                display: flex;
                flex-direction: column;
                position: absolute;
                background-color: #CCFFCC;
                width: 27%;
                height: 100vh;
                left: 0;
                top: 0;
                gap: 10px;
                overflow: auto;
            }
            .tabs {
                display: flex;
                flex-direction: column;
                margin-top: 10%;
                gap: 15px;
                height: fit-content;
                box-sizing: border-box;
            }
            .tab {
                display: flex;
                height: 50px;
                width: 90%;
                margin: 0 auto;
                border-radius: 20px;
                outline: 1px solid #2f4f44;
                box-sizing: border-box; 
                transition: background-color 0.5s ease;
            }
            .tab:hover {
                background-color: #b4fcb4;
            }
            .tab-content {
                display: flex;
                justify-content: center;
                margin-left: 10%;
                margin-top: 3%;
            }
            .tab-icon {
                color: #1B4D1B;
            }
            .tab-description {
                font-family: 'Sour Gummy', sans-serif;
                margin-left: 10px;
                font-size: 125%;
            }
            .groups {
                display: flex;
                flex-direction: column;
                gap: 10px;
                margin-top: 6%;
            }
            .group-title {
                font-family: 'Sour Gummy', sans-serif;
                margin-left: 10%;
                font-size: 145%;
            }
            .group-tabs {
                display: flex;
                flex-direction: column;
                width: 80%;
                margin-left: 16%;
                margin-top: 4%;
                gap: 10px;
                max-height: 120px;
                overflow-y: auto;
            }
            .group-tabs div {
                transition: background-color 0.5s ease;
            }
            .group-tabs div:hover {
                border-radius: 10px;
                background-color: #b4fcb4;
            }
            .main {
                position: absolute;
                top: 0;
                left: 27%;
                background-color: #e8ffe8;
                width: 73vw;
                height: 100vh;
            }
        </style>
    </head>
    <body>
        <div class="side-bar">
            <div class="tabs">
                <div class="tab">
                    <div class="tab-content">
                        <span class="material-symbols-outlined tab-icon">
                            search
                        </span>
                        <div class="tab-description">Search</div>
                    </div>
                </div>
                <div class="tab">
                    <div class="tab-content">
                        <span class="material-symbols-outlined">
                            today
                        </span>
                        <div class="tab-description">Today</div>
                    </div>
                </div>
                <div class="tab">
                    <div class="tab-content">
                        <span class="material-symbols-outlined">
                            calendar_today
                        </span>
                        <div class="tab-description">Upcoming</div>
                    </div>
                </div>
                <div class="tab">
                    <div class="tab-content">
                        <span class="material-symbols-outlined">
                            add
                        </span>
                        <div class="tab-description">New task</div>
                    </div>
                </div>
            </div>
            <hr style="border-color: #263a33; width: 90%; margin-top: 6%;">
            <div class="tab">
                <div class="tab-content">
                    <span class="material-symbols-outlined tab-icon">
                        add
                    </span>
                    <div class="tab-description">New group</div>
                </div>
            </div>
            <div class="groups">
                <div class="group">
                    <div class="group-title">Programing project</div>
                    <div class="group-tabs">
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                    </div>
                </div>
                <div class="group">
                    <div class="group-title">Programing project</div>
                    <div class="group-tabs">
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                        <div class="tab-description">
                            <span class="material-symbols-outlined">
                                tag
                            </span>
                            To-do list
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main"></div>
    </body>
</html>
